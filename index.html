<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>旅遊行程規劃 (雲端同步版)</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    :root {
      --bg:    #13162a; --card:  #1e2240; --card2: #252a4a;
      --pink:  #f06292; --pinkd: #e91e8c; --blue:  #5c6bc0;
      --teal:  #26c6da; --green: #66bb6a; --amber: #ffa726; --red: #ef5350;
      --t1: #e8eaf6; --t2: #9fa8da; --t3: #7986cb;
    }
    *{font-family:'Noto Sans TC',sans-serif;box-sizing:border-box;}
    body{background:var(--bg);color:var(--t1);margin:0;min-height:100vh;overflow-x:hidden;}
    ::-webkit-scrollbar{width:4px;height:4px;}
    ::-webkit-scrollbar-thumb{background:#3d4575;border-radius:4px;}

    /* ── 頁面層疊 ── */
    #screen-home{position:fixed;inset:0;z-index:200;background:var(--bg);display:flex;flex-direction:column;overflow-y:auto;}
    #screen-trip{position:fixed;inset:0;z-index:100;background:var(--bg);display:none;flex-direction:column;}

    /* ── 首頁 ── */
    .home-header{
      background:linear-gradient(135deg,#1a1f3c,#1e2444);
      padding:40px 24px 28px;
      border-bottom:1px solid rgba(255,255,255,0.06);
    }
    .home-logo{font-size:32px;margin-bottom:8px;}
    .home-title{font-size:26px;font-weight:700;letter-spacing:.02em;}
    .home-sub{font-size:14px;color:var(--t3);margin-top:4px;}

    .project-list{padding:20px 20px 120px;flex:1;}
    .project-card{
      background:var(--card);border:1px solid rgba(255,255,255,0.07);
      border-radius:18px;padding:18px;margin-bottom:14px;
      cursor:pointer;transition:all .2s;position:relative;overflow:hidden;
    }
    .project-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:linear-gradient(90deg,var(--pink),var(--blue));
    }
    .project-card:hover{border-color:rgba(240,98,146,0.3);transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,0.3);}
    .project-emoji{font-size:28px;margin-bottom:8px;}
    .project-name{font-size:17px;font-weight:700;margin-bottom:4px;}
    .project-meta{font-size:12px;color:var(--t3);}
    .project-actions{position:absolute;top:14px;right:14px;display:flex;gap:6px;}
    .proj-btn{
      width:30px;height:30px;border-radius:8px;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:14px;
      background:rgba(255,255,255,0.07);transition:all .15s;
    }
    .proj-btn:hover{transform:scale(1.1);}
    .proj-btn-edit{color:#64b5f6;}
    .proj-btn-del{color:var(--red);}
    .proj-btn-edit:hover{background:rgba(100,181,246,.15);}
    .proj-btn-del:hover{background:rgba(239,83,80,.15);}

    .fab-new{
      position:fixed;bottom:28px;left:50%;transform:translateX(-50%);
      max-width:390px;width:calc(100% - 48px);
      display:flex;align-items:center;justify-content:center;gap:8px;
      background:linear-gradient(135deg,var(--pink),var(--pinkd));
      color:white;font-size:15px;font-weight:700;
      border-radius:28px;padding:16px 24px;border:none;cursor:pointer;
      box-shadow:0 6px 24px rgba(240,98,146,0.45);
      transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:210;
    }
    .fab-new:hover{transform:translateX(-50%) translateY(-3px);box-shadow:0 12px 32px rgba(240,98,146,0.55);}

    /* ── 旅程頁頂欄 ── */
    .trip-header{
      background:linear-gradient(135deg,#1a1f3c,#1e2444);
      border-bottom:1px solid rgba(255,255,255,0.06);
      padding:14px 16px 12px;
      position:sticky;top:0;z-index:50;backdrop-filter:blur(20px);
      flex-shrink:0;
    }
    .trip-title{font-size:18px;font-weight:700;letter-spacing:.02em;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px;}
    .trip-sub{font-size:11px;color:var(--t3);margin-top:1px;}
    .badge{
      display:flex;align-items:center;gap:4px;
      background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
      border-radius:20px;padding:4px 10px;font-size:11px;color:var(--t2);
      cursor:pointer;transition:all .2s;white-space:nowrap;
    }
    .badge:hover{background:rgba(255,255,255,0.12);}
    .badge-pink{color:var(--pink);border-color:rgba(240,98,146,0.3);}

    /* ── 日期欄 ── */
    .day-tabs-wrap{
      background:rgba(30,34,64,0.95);border-bottom:1px solid rgba(255,255,255,0.05);
      padding:8px 14px;
      overflow-x:scroll;
      -webkit-overflow-scrolling:touch;
      display:flex;gap:7px;position:sticky;top:72px;z-index:40;
      backdrop-filter:blur(12px);flex-shrink:0;
      -webkit-mask:linear-gradient(to right,black calc(100% - 32px),transparent 100%);
      mask:linear-gradient(to right,black calc(100% - 32px),transparent 100%);
    }
    .day-tabs-wrap::-webkit-scrollbar{display:none;}
    .day-tab{
      display:inline-flex;flex-direction:column;align-items:center;
      min-width:60px;flex-shrink:0;padding:5px 9px;border-radius:12px;
      border:1.5px solid transparent;cursor:pointer;
      font-size:12px;font-weight:500;color:var(--t3);
      background:rgba(255,255,255,0.04);
      transition:all .25s cubic-bezier(.34,1.56,.64,1);user-select:none;
    }
    .day-tab:hover{background:rgba(255,255,255,0.08);color:var(--t2);transform:translateY(-1px);}
    .day-tab.active{
      background:linear-gradient(135deg,var(--pink),var(--pinkd));
      color:white;box-shadow:0 4px 14px rgba(240,98,146,0.4);transform:translateY(-2px);
    }
    .day-add-btn{
      display:inline-flex;align-items:center;justify-content:center;
      min-width:40px;flex-shrink:0;height:54px;border-radius:12px;
      border:1.5px dashed rgba(240,98,146,0.4);
      color:rgba(240,98,146,0.7);font-size:20px;
      cursor:pointer;transition:all .2s;background:rgba(240,98,146,0.04);
      margin-right:24px;
    }
    .day-add-btn:hover{border-color:var(--pink);color:var(--pink);background:rgba(240,98,146,0.08);}

    /* ── 視圖切換 ── */
    .view-toggle{
      display:grid;grid-template-columns:1fr 1fr;
      background:rgba(255,255,255,0.04);border-radius:13px;
      padding:4px;margin:12px 14px 0;flex-shrink:0;
    }
    .view-btn{
      display:flex;align-items:center;justify-content:center;gap:5px;
      padding:8px;border-radius:10px;font-size:13px;font-weight:500;
      color:var(--t3);cursor:pointer;transition:all .2s;border:none;background:none;
    }
    .view-btn.active{
      background:linear-gradient(135deg,var(--pink),var(--pinkd));
      color:white;box-shadow:0 4px 12px rgba(240,98,146,0.35);
    }
    .view-btn:not(.active):hover{color:var(--t2);background:rgba(255,255,255,0.06);}

    /* ── 行程視圖 ── */
    .itinerary-view{flex:1;overflow-y:auto;display:flex;flex-direction:column;}
    .itinerary-view.hidden{display:none;}
    .itinerary-content{padding:10px 14px 110px;}

    .stop-row{display:flex;gap:11px;align-items:flex-start;}
    .stop-left{display:flex;flex-direction:column;align-items:center;min-width:42px;}
    .stop-time{font-size:11px;font-weight:600;color:var(--pink);white-space:nowrap;margin-bottom:5px;}
    .stop-dot{
      width:11px;height:11px;border-radius:50%;
      border:2.5px solid var(--pink);background:var(--bg);
      position:relative;z-index:2;flex-shrink:0;
      box-shadow:0 0 0 3px rgba(240,98,146,0.15);
    }
    .stop-line{width:2px;background:linear-gradient(to bottom,rgba(240,98,146,0.35),rgba(92,107,192,0.15));flex:1;min-height:20px;}

    .stop-card{
      flex:1;background:var(--card);
      border:1px solid rgba(255,255,255,0.07);
      border-radius:14px;padding:12px;margin-bottom:3px;
      box-shadow:0 4px 18px rgba(0,0,0,0.22);
      transition:all .2s;position:relative;overflow:hidden;
      animation:slideUp .3s ease both;
    }
    .stop-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:2px;
      background:linear-gradient(90deg,var(--pink),transparent);opacity:.5;
    }
    .stop-card:hover{border-color:rgba(240,98,146,0.25);transform:translateY(-1px);box-shadow:0 7px 24px rgba(0,0,0,0.28);}
    .sortable-ghost{opacity:.35;background:rgba(240,98,146,0.06)!important;}
    .sortable-chosen{box-shadow:0 0 0 2px var(--pink),0 8px 28px rgba(240,98,146,0.28)!important;}

    .stop-name{font-size:15px;font-weight:700;margin-bottom:2px;}
    .stop-name-sub{font-size:11px;color:var(--t3);margin-bottom:5px;}
    .stop-desc{font-size:12px;color:var(--t2);line-height:1.6;margin-bottom:9px;}
    .stop-num{
      position:absolute;top:10px;right:68px;width:22px;height:22px;border-radius:50%;
      background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);
      display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--t3);
    }
    .tags{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;}
    .tag{display:inline-flex;align-items:center;gap:3px;padding:2px 9px;border-radius:20px;font-size:10px;font-weight:500;}
    .tag-sight{background:rgba(255,167,38,.15);border:1px solid rgba(255,167,38,.3);color:var(--amber);}
    .tag-free {background:rgba(102,187,106,.15);border:1px solid rgba(102,187,106,.3);color:var(--green);}
    .tag-food {background:rgba(38,198,218,.15);border:1px solid rgba(38,198,218,.3);color:var(--teal);}
    .tag-shop {background:rgba(92,107,192,.15);border:1px solid rgba(92,107,192,.3);color:var(--blue);}
    .tag-paid {background:rgba(239,83,80,.15);border:1px solid rgba(239,83,80,.3);color:var(--red);}

    .highlights-title{font-size:11px;font-weight:600;color:var(--pink);margin-bottom:4px;}
    .highlight-item{display:flex;gap:5px;align-items:flex-start;font-size:11px;color:var(--t2);margin-bottom:2px;line-height:1.5;}
    .highlight-item::before{content:'•';color:var(--pink);flex-shrink:0;}

    .action-btns{display:flex;gap:5px;flex-wrap:wrap;}
    .act-btn{
      display:flex;align-items:center;gap:3px;
      background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:18px;padding:4px 9px;font-size:10px;color:var(--t2);
      cursor:pointer;white-space:nowrap;transition:all .2s;
    }
    .act-btn:hover{background:rgba(255,255,255,0.12);color:var(--t1);}

    .card-actions{position:absolute;top:9px;right:9px;display:flex;gap:3px;}
    .card-icon-btn{
      width:24px;height:24px;border-radius:7px;border:none;cursor:pointer;
      display:flex;align-items:center;justify-content:center;font-size:12px;
      transition:all .15s;background:rgba(255,255,255,0.07);
    }
    .card-icon-btn:hover{transform:scale(1.15);}
    .btn-edit{color:#64b5f6;}.btn-edit:hover{background:rgba(100,181,246,.15);}
    .btn-delete{color:var(--red);}.btn-delete:hover{background:rgba(239,83,80,.15);}

    .transport-row{display:flex;gap:11px;align-items:center;padding:3px 0;}
    .transport-left{min-width:42px;display:flex;justify-content:center;}
    .transport-line-seg{width:2px;height:32px;background:linear-gradient(to bottom,rgba(92,107,192,0.3),rgba(92,107,192,0.1));}
    .transport-pill{
      display:flex;align-items:center;gap:5px;
      background:rgba(92,107,192,0.1);border:1px solid rgba(92,107,192,0.2);
      border-radius:18px;padding:4px 11px;font-size:11px;color:var(--t3);flex:1;
    }

    .add-stop-btn{
      display:flex;align-items:center;justify-content:center;gap:5px;
      margin:4px 0 4px 53px;padding:6px 14px;
      border:1.5px dashed rgba(240,98,146,0.35);border-radius:10px;
      font-size:12px;color:rgba(240,98,146,0.7);cursor:pointer;
      transition:all .2s;background:rgba(240,98,146,0.04);
    }
    .add-stop-btn:hover{border-color:var(--pink);color:var(--pink);background:rgba(240,98,146,0.08);}

    /* ── 地圖視圖 ── */
    .map-view{flex:1;display:none;flex-direction:column;min-height:0;}
    .map-view.show{display:flex;}
    #leaflet-map{flex:1;min-height:0;z-index:1;}
    .leaflet-tile{filter:brightness(0.75) saturate(0.8) hue-rotate(180deg) invert(1);}
    .leaflet-container{background:#1a1d30;}
    .leaflet-popup-content-wrapper{
      background:var(--card)!important;border:1px solid rgba(255,255,255,0.1)!important;
      border-radius:14px!important;box-shadow:0 8px 32px rgba(0,0,0,0.5)!important;
      color:var(--t1)!important;padding:0!important;
    }
    .leaflet-popup-content{margin:0!important;width:auto!important;}
    .leaflet-popup-tip{background:var(--card)!important;}
    .leaflet-popup-close-button{color:var(--t3)!important;font-size:18px!important;top:8px!important;right:10px!important;}

    .popup-inner{padding:14px 16px 12px;min-width:200px;}
    .popup-time{font-size:11px;color:var(--t3);margin-bottom:3px;}
    .popup-name{font-size:15px;font-weight:700;margin-bottom:2px;}
    .popup-sub {font-size:11px;color:var(--t3);margin-bottom:7px;}
    .popup-desc{font-size:12px;color:var(--t2);line-height:1.5;margin-bottom:10px;}
    .popup-nav {
      display:flex;align-items:center;justify-content:center;gap:6px;
      background:linear-gradient(135deg,#1a73e8,#1557b0);
      color:white;border-radius:8px;padding:7px 12px;
      font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;
    }

    .map-legend-ctrl{
      background:rgba(19,22,42,0.92)!important;border:1px solid rgba(255,255,255,0.1)!important;
      border-radius:12px!important;padding:10px 12px!important;
      backdrop-filter:blur(10px);
    }
    .legend-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t2);margin-bottom:5px;}
    .legend-item:last-child{margin-bottom:0;}
    .legend-dot{width:10px;height:10px;border-radius:50%;}

    .locate-btn{
      position:absolute;bottom:130px;right:14px;z-index:20;
      width:42px;height:42px;border-radius:13px;border:none;cursor:pointer;
      background:rgba(19,22,42,0.95);border:1.5px solid rgba(255,255,255,0.15);
      display:flex;align-items:center;justify-content:center;font-size:18px;
      transition:all .2s;backdrop-filter:blur(10px);color:var(--t1);
      box-shadow:0 4px 14px rgba(0,0,0,0.4);
    }
    .locate-btn:hover{background:rgba(240,98,146,0.25);border-color:var(--pink);}
    .locate-btn.locating{border-color:var(--teal);animation:pulsate 1s infinite;}

    /* ── 浮動按鈕 ── */
    .fab{
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      max-width:390px;width:calc(100% - 48px);
      display:flex;align-items:center;justify-content:center;gap:7px;
      background:linear-gradient(135deg,var(--pink),var(--pinkd));
      color:white;font-size:13px;font-weight:700;
      border-radius:26px;padding:13px 22px;border:none;cursor:pointer;
      box-shadow:0 6px 22px rgba(240,98,146,0.45);
      transition:all .25s cubic-bezier(.34,1.56,.64,1);z-index:90;
    }
    .fab:hover{transform:translateX(-50%) translateY(-3px);box-shadow:0 12px 30px rgba(240,98,146,0.55);}
    .fab.sort-mode{background:linear-gradient(135deg,#43a047,#2e7d32);box-shadow:0 6px 22px rgba(67,160,71,0.45);}

    /* ── Modal ── */
    .modal-overlay{
      position:fixed;inset:0;z-index:500;
      background:rgba(0,0,0,0.65);backdrop-filter:blur(8px);
      display:flex;align-items:flex-end;justify-content:center;
      opacity:0;pointer-events:none;transition:opacity .25s;
    }
    .modal-overlay.show{opacity:1;pointer-events:all;}
    .modal-box{
      background:#1c2040;border-radius:22px 22px 0 0;
      padding:22px 18px 34px;width:100%;max-width:430px;
      border:1px solid rgba(255,255,255,0.08);border-bottom:none;
      transform:translateY(100%);transition:transform .3s cubic-bezier(.34,1.56,.64,1);
      max-height:92vh;overflow-y:auto;
    }
    .modal-overlay.show .modal-box{transform:translateY(0);}
    .modal-drag{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.2);margin:0 auto 18px;}
    .modal-title{font-size:17px;font-weight:700;margin-bottom:18px;text-align:center;}
    .modal-label{font-size:12px;color:var(--t3);margin-bottom:4px;font-weight:500;}
    .modal-input,.modal-select,.modal-textarea{
      width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
      border-radius:10px;padding:9px 11px;color:var(--t1);font-size:13px;
      outline:none;transition:border-color .2s;margin-bottom:13px;
    }
    .modal-input:focus,.modal-select:focus,.modal-textarea:focus{border-color:var(--pink);}
    .modal-select option{background:#1c2040;}
    .modal-textarea{min-height:65px;resize:vertical;}
    .modal-row{display:grid;grid-template-columns:1fr 1fr;gap:11px;}
    .modal-save{
      width:100%;padding:13px;border-radius:13px;border:none;cursor:pointer;
      background:linear-gradient(135deg,var(--pink),var(--pinkd));
      color:white;font-size:14px;font-weight:700;
      box-shadow:0 4px 14px rgba(240,98,146,0.4);transition:all .2s;
    }
    .modal-save:hover{opacity:.9;transform:translateY(-1px);}
    .modal-cancel{
      width:100%;padding:10px;border-radius:13px;border:none;cursor:pointer;
      background:rgba(255,255,255,0.06);color:var(--t2);font-size:13px;margin-top:7px;
    }
    .modal-cancel:hover{background:rgba(255,255,255,0.1);}
    .modal-sep{height:1px;background:rgba(255,255,255,0.07);margin:4px 0 14px;}

    /* ── Toast ── */
    .toast{
      position:fixed;bottom:88px;left:50%;transform:translateX(-50%) translateY(12px);
      background:rgba(28,32,64,0.96);border:1px solid rgba(255,255,255,0.1);
      border-radius:12px;padding:9px 18px;font-size:13px;color:var(--t1);
      box-shadow:0 8px 24px rgba(0,0,0,0.35);z-index:600;
      opacity:0;pointer-events:none;transition:all .3s;white-space:nowrap;
    }
    .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    .empty-state{text-align:center;padding:50px 20px;color:var(--t3);}
    .empty-icon{font-size:44px;margin-bottom:14px;}
    #search-results::-webkit-scrollbar{width:3px;}
    #search-results::-webkit-scrollbar-thumb{background:#3d4575;}

    @keyframes pulsate{0%,100%{box-shadow:0 0 0 0 rgba(38,198,218,0.5)}50%{box-shadow:0 0 0 6px rgba(38,198,218,0)}}
    @keyframes slideUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  </style>
</head>
<body>

<div id="screen-home">
  <div class="home-header">
    <div class="home-logo">✈️</div>
    <div class="home-title">旅遊行程規劃</div>
    <div class="home-sub">管理你的所有旅遊計畫 (雲端同步中)</div>
  </div>
  <div class="project-list" id="project-list"></div>
  <button class="fab-new" onclick="openNewProjectModal()">＋ 新增旅遊計畫</button>
</div>

<div id="screen-trip" style="display:none;">
  <div class="trip-header">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-2">
        <button onclick="goHome()" style="background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:10px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--t2);flex-shrink:0;">←</button>
        <div>
          <div class="trip-title" id="trip-title">載入中...</div>
          <div class="trip-sub" id="trip-sub">載入中...</div>
        </div>
      </div>
      <div class="flex gap-1 flex-wrap justify-end">
        <div class="badge badge-pink" onclick="openEditProjectModal()">⚙️ 編輯</div>
        <div class="badge" id="badge-people">👥 -</div>

      設定您的 Google Gemini API Key 以啟用 AI 推薦功能。

<script>
/* ═══════════════════════════════════════════════════════════
   Supabase 雲端資料庫初始化
═══════════════════════════════════════════════════════════ */
const { createClient } = supabase;

// 👇 請在這裡填寫你的 Anon Key 👇
const SUPABASE_URL = 'https://qbansvtxerdvrqqpjmzi.supabase.co';
const SUPABASE_KEY = '請貼上你的_Anon_Key'; 

const _supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

// 目前尚未串接 Firebase 登入，所以先使用一個固定的「測試帳號 ID」
const TEMP_USER_ID = 'my_test_account_001';

const DEFAULT_PROJECT = {
  id: 'fukuoka_default', name: '福岡家庭旅遊', dest: 'Fukuoka, Japan', emoji: '🌸', startDate: '2026-08-01', endDate: '2026-08-06', people: 4, mapCenter: [33.5902, 130.4017],
  days: [{emoji:'✈️',label:'第1天',weekday:'日'}], stops: {}
};

let projects = [];
let currentProjId = null; 
let currentDay = 0;
let sortable = null;
let sortMode = false;
let editingStopId = null;  
let insertAfterIdx = -1;
let editingProjectId = null; 
let leafletMap = null;
let markersLayer = null;
let locateMarker = null;

/* ─── 雲端讀寫 (取代原本的 localStorage) ─── */
async function loadProjects(){
  try {
    const { data, error } = await _supabase
      .from('cloud_trips')
      .select('data')
      .eq('user_id', TEMP_USER_ID)
      .single();

    if (error && error.code !== 'PGRST116') {
      console.error('讀取雲端失敗:', error);
    }

    if (data && data.data) {
      projects = data.data;
    } else {
      // 雲端還沒有資料，載入預設值並自動存上雲端
      projects = [JSON.parse(JSON.stringify(DEFAULT_PROJECT))];
      await saveProjects();
    }
  } catch(e) {
    console.error(e);
    projects = [];
  }
  
  // 更新首頁與內頁畫面
  renderHome();
  if(currentProjId){
    updateTripHeader();
    renderDayTabs();
    renderTimeline();
    if(leafletMap) updateMapMarkers();
  }
}

async function saveProjects(){ 
  const { error } = await _supabase
    .from('cloud_trips')
    .upsert({ user_id: TEMP_USER_ID, data: projects });
    
  if(error) {
    console.error('雲端同步失敗', error);
    showToast('⚠️ 雲端同步失敗，請檢查網路');
  } else {
    console.log('✅ 已同步至 Supabase');
  }
}

/* ═══════════════════════════════════════════════════════════
   首頁與專案管理
═══════════════════════════════════════════════════════════ */
function renderHome(){
  const list = document.getElementById('project-list');
  if(!projects.length){
    list.innerHTML = `<div class="empty-state"><div class="empty-icon">🗺️</div><div style="font-size:16px;font-weight:600;margin-bottom:8px;">還沒有任何旅遊計畫</div><div style="font-size:13px;">點擊下方按鈕建立第一個計畫</div></div>`;
    return;
  }
  list.innerHTML = projects.map(p => {
    const nights = calcNights(p.startDate, p.endDate);
    const meta   = [nights ? `${nights}晚${nights+1}天` : '', p.dest, p.people ? `${p.people}人` : ''].filter(Boolean).join(' · ');
    return `
    <div class="project-card" onclick="openProject('${p.id}')">
      <div class="project-actions" onclick="event.stopPropagation()">
        <button class="proj-btn proj-btn-edit" onclick="openEditProjectModal('${p.id}')">✏️</button>
        <button class="proj-btn proj-btn-del"  onclick="deleteProject('${p.id}')">🗑️</button>
      </div>
      <div class="project-emoji">${p.emoji||'✈️'}</div>
      <div class="project-name">${p.name}</div>
      <div class="project-meta">${meta}</div>
    </div>`;
  }).join('');
}

function calcNights(s,e){
  if(!s||!e) return 0;
  const diff = (new Date(e)-new Date(s))/(1000*60*60*24);
  return Math.max(0, Math.round(diff));
}

function openNewProjectModal(){
  editingProjectId = null;
  document.getElementById('proj-modal-title').textContent = '✈️ 新增旅遊計畫';
  document.getElementById('proj-save-btn').textContent    = '✅ 建立計畫';
  ['proj-name','proj-dest','proj-emoji','proj-start','proj-end','proj-center'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('proj-people').value = '2';
  openModal('modal-project');
}

function openEditProjectModal(projId){
  const pid  = projId || currentProjId;
  const proj = projects.find(p=>p.id===pid);
  if(!proj) return;
  editingProjectId = pid;
  document.getElementById('proj-modal-title').textContent = '⚙️ 編輯計畫資訊';
  document.getElementById('proj-save-btn').textContent    = '💾 儲存';
  document.getElementById('proj-name').value   = proj.name    ||'';
  document.getElementById('proj-dest').value   = proj.dest    ||'';
  document.getElementById('proj-emoji').value  = proj.emoji   ||'';
  document.getElementById('proj-start').value  = proj.startDate||'';
  document.getElementById('proj-end').value    = proj.endDate  ||'';
  document.getElementById('proj-people').value = proj.people   ||2;
  document.getElementById('proj-center').value = proj.mapCenter ? proj.mapCenter.join(', ') : '';
  openModal('modal-project');
}

async function saveProject(){
  const name   = document.getElementById('proj-name').value.trim();
  if(!name){ showToast('⚠️ 請輸入計畫名稱'); return; }
  const dest    = document.getElementById('proj-dest').value.trim();
  const emoji   = document.getElementById('proj-emoji').value.trim() || '✈️';
  const start   = document.getElementById('proj-start').value;
  const end     = document.getElementById('proj-end').value;
  const people  = parseInt(document.getElementById('proj-people').value)||2;
  const centerTxt = document.getElementById('proj-center').value.trim();
  let mapCenter = [35.6812, 139.7671]; 
  if(centerTxt){
    const parts = centerTxt.split(',').map(s=>parseFloat(s.trim()));
    if(parts.length===2 && !isNaN(parts[0]) && !isNaN(parts[1])) mapCenter = parts;
  }

  if(editingProjectId){
    const proj = projects.find(p=>p.id===editingProjectId);
    if(proj){
      proj.name=name; proj.dest=dest; proj.emoji=emoji;
      proj.startDate=start; proj.endDate=end; proj.people=people; proj.mapCenter=mapCenter;
      if(start&&end) proj.days = buildDays(start,end);
    }
    showToast('✅ 計畫已更新');
  } else {
    const proj = {
      id: 'p'+Date.now(),
      name, dest, emoji, startDate:start, endDate:end, people, mapCenter,
      days: start&&end ? buildDays(start,end) : [{emoji:'📅',label:'第1天',weekday:'一'}],
      stops: {}
    };
    projects.push(proj);
    showToast('🎉 計畫已建立！');
  }
  
  await saveProjects(); // 異步寫入雲端
  closeModal('modal-project');
  renderHome();
  if(currentProjId && editingProjectId===currentProjId) updateTripHeader();
}

async function deleteProject(id){
  if(!confirm('確定要刪除這個旅遊計畫嗎？')) return;
  projects = projects.filter(p=>p.id!==id);
  await saveProjects();
  renderHome();
  showToast('🗑️ 計畫已刪除');
}

function buildDays(start, end){
  const days  = [];
  const weeki = ['日','一','二','三','四','五','六'];
  const emojis= ['📅','🌅','☀️','🌙','🎯','🎪','🌟','🎭','🎨','🍜'];
  let d = new Date(start);
  const last = new Date(end);
  let i = 0;
  while(d<=last){
    days.push({ emoji: emojis[i%emojis.length], label:`第${i+1}天`, weekday: weeki[d.getDay()] });
    d.setDate(d.getDate()+1); i++;
  }
  return days.length ? days : [{emoji:'📅',label:'第1天',weekday:'一'}];
}

/* ═══════════════════════════════════════════════════════════
   旅程頁面功能
═══════════════════════════════════════════════════════════ */
function openProject(id){
  currentProjId = id;
  currentDay    = 0;
  document.getElementById('screen-home').style.display = 'none';
  document.getElementById('screen-trip').style.display = 'flex';
  document.getElementById('fab').style.display = '';
  updateTripHeader();
  updateApiKeyBadge();
  renderDayTabs();
  renderTimeline();
  initLeafletMap();
}

function goHome(){
  document.getElementById('screen-home').style.display = 'flex';
  document.getElementById('screen-trip').style.display = 'none';
  document.getElementById('fab').style.display = 'none';
  switchView('itinerary');
  renderHome();
}

function updateTripHeader(){
  const proj = projects.find(p=>p.id===currentProjId);
  if(!proj) return;
  document.getElementById('trip-title').textContent = `${proj.emoji} ${proj.name}`;
  const nights = calcNights(proj.startDate, proj.endDate);
  document.getElementById('trip-sub').textContent  = [nights?`${nights}晚${nights+1}天`:'', proj.dest].filter(Boolean).join(' · ');
  document.getElementById('badge-people').textContent = `👥 ${proj.people||'-'}人`;
}

async function addDay(){
  const proj = projects.find(p=>p.id===currentProjId);
  if(!proj) return;
  const n = proj.days.length+1;
  const emojis=['📅','🌅','☀️','🌙','🎯','🎪','🌟','🎭','🎨','🍜'];
  proj.days.push({emoji:emojis[n%emojis.length], label:`第${n}天`, weekday:'─'});
  await saveProjects();
  renderDayTabs();
  showToast(`✅ 已新增第${n}天`);
}

function renderDayTabs(){
  const proj = projects.find(p=>p.id===currentProjId);
  if(!proj) return;
  const container = document.getElementById('day-tabs');
  container.innerHTML = proj.days.map((d,i)=>`
    <div class="day-tab ${i===currentDay?'active':''}" id="day-tab-${i}" onclick="switchDay(${i})">
      <span style="font-size:15px;margin-bottom:1px;">${d.emoji}</span>
      <span style="font-size:11px;font-weight:600;">${d.label}</span>
      <span style="font-size:10px;color:${i===currentDay?'rgba(255,255,255,0.7)':'var(--t3)'};">${d.weekday}</span>
    </div>`).join('')
  + `<div class="day-add-btn" onclick="addDay()">＋</div>`;
  setTimeout(()=>{
    const active = document.getElementById(`day-tab-${currentDay}`);
    if(active) active.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});
  }, 50);
}

function switchDay(idx){
  currentDay = idx;
  if(sortMode) toggleSortMode();
  renderDayTabs();   
  renderTimeline();
  if(leafletMap) updateMapMarkers();
}

function switchView(view){
  const itin  = document.getElementById('view-itinerary');
  const mapV  = document.getElementById('view-map');
  const btnI  = document.getElementById('btn-itinerary');
  const btnM  = document.getElementById('btn-map');
  if(view==='itinerary'){
    itin.classList.remove('hidden'); mapV.classList.remove('show');
    btnI.classList.add('active'); btnM.classList.remove('active');
    document.getElementById('fab').style.display='';
  } else {
    itin.classList.add('hidden'); mapV.classList.add('show');
    btnM.classList.add('active'); btnI.classList.remove('active');
    document.getElementById('fab').style.display='none';
    if(leafletMap){ setTimeout(()=>{ leafletMap.invalidateSize(); updateMapMarkers(); },100); }
  }
}

function getTagHtml(type, free, price){
  const map={sight:`<span class="tag tag-sight">⛩️ 觀光</span>`,food:`<span class="tag tag-food">🍜 餐飲</span>`,shop:`<span class="tag tag-shop">🛍️ 購物</span>`,transport:`<span class="tag tag-sight">✈️ 交通</span>`};
  return (map[type]||'') + (free ? `<span class="tag tag-free">✓ 免費</span>` : `<span class="tag tag-paid">💴 ${price||'付費'}</span>`);
}

function renderTimeline(){
  const proj   = projects.find(p=>p.id===currentProjId);
  const stops  = (proj?.stops||{})[currentDay]||[];
  const tl     = document.getElementById('timeline');
  if(!stops.length){
    tl.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div style="font-size:15px;font-weight:600;margin-bottom:7px;">今天還沒有行程</div><div style="font-size:12px;">點擊下方按鈕新增第一個景點</div></div><div class="add-stop-btn" onclick="openAddModal(-1)">＋ 新增景點</div>`;
    initSortable(); return;
  }
  let html='';
  stops.forEach((stop,idx)=>{
    const hl = (stop.highlights||[]).length ? `<div style="margin-bottom:9px;"><div class="highlights-title">🚀 推薦亮點</div>${stop.highlights.map(h=>`<div class="highlight-item">${h}</div>`).join('')}</div>`:'';
    html+=`
    <div class="stop-row" data-id="${stop.id}">
      <div class="stop-left">
        <div class="stop-time">${stop.time}</div><div class="stop-dot"></div><div class="stop-line"></div>
      </div>
      <div style="flex:1">
        <div class="stop-card">
          <div class="card-actions">
            <button class="card-icon-btn btn-edit" onclick="openEditModal('${stop.id}')">✏️</button>
            <button class="card-icon-btn btn-delete" onclick="deleteStop('${stop.id}')">🗑️</button>
          </div>
          <div class="stop-num">${idx+1}</div>
          <div class="stop-name">${stop.name}</div>
          ${stop.sub?`<div class="stop-name-sub">${stop.sub}</div>`:''}
          ${stop.desc?`<div class="stop-desc">${stop.desc}</div>`:''}
          <div class="tags">${getTagHtml(stop.type,stop.free,stop.price)}</div>
          ${hl}
          <div class="action-btns"><span class="act-btn" onclick="flyToStop('${stop.id}')">🗺️ 地圖定位</span></div>
        </div>
      </div>
    </div>
    <div class="add-stop-btn" onclick="openAddModal(${idx})">＋ 在此加入新景點</div>`;
    if(stop.transport && idx<stops.length-1){
      html+=`<div class="transport-row"><div class="transport-left"><div class="transport-line-seg"></div></div><div class="transport-pill">${stop.transport}</div></div>`;
    }
  });
  tl.innerHTML = html;
  initSortable();
}

function initSortable(){
  if(sortable){ sortable.destroy(); sortable=null; }
  const tl = document.getElementById('timeline');
  sortable = Sortable.create(tl,{
    animation:180, handle:'.stop-card', draggable:'.stop-row',
    ghostClass:'sortable-ghost', chosenClass:'sortable-chosen',
    disabled:!sortMode,
    async onEnd(evt){
      const proj  = projects.find(p=>p.id===currentProjId);
      const stops = (proj?.stops||{})[currentDay]||[];
      const ids   = [...tl.querySelectorAll('.stop-row')].map(r=>r.getAttribute('data-id'));
      proj.stops[currentDay] = ids.map(id=>stops.find(s=>s.id===id)).filter(Boolean);
      await saveProjects();
      renderTimeline();
      if(leafletMap) updateMapMarkers();
      showToast('✅ 排序已同步至雲端');
    }
  });
}

function toggleSortMode(){
  sortMode = !sortMode;
  const fab = document.getElementById('fab');
  if(sortMode){
    sortable?.option('disabled',false);
    fab.textContent='✅ 完成排序'; fab.classList.add('sort-mode');
    showToast('📌 拖曳卡片以重新排序');
  } else {
    sortable?.option('disabled',true);
    fab.textContent='✏️ 調整行程順序'; fab.classList.remove('sort-mode');
  }
}

/* ═══════════════════════════════════════════════════════════
   景點增刪改
═══════════════════════════════════════════════════════════ */
function genId(){ return 's'+Date.now()+Math.random().toString(36).slice(2,6); }

function openAddModal(afterIdx){
  editingStopId = null; insertAfterIdx = afterIdx;
  _aiHighlights = [];
  document.getElementById('stop-modal-title').textContent = '➕ 新增景點';
  document.getElementById('stop-save-btn').textContent    = '✅ 新增';
  ['inp-time','inp-name','inp-sub','inp-desc','inp-transport','inp-search','inp-lat','inp-lng','inp-price'].forEach(id=>{
    const el = document.getElementById(id); if(el) el.value='';
  });
  document.getElementById('inp-type').value = 'sight'; document.getElementById('inp-free').value = 'true';
  document.getElementById('price-field').style.display='none';
  document.getElementById('search-results').style.display='none';
  document.getElementById('selected-place').style.display='none';
  document.getElementById('ai-highlights-preview').style.display='none';
  document.getElementById('search-section').style.display='';
  openModal('modal-stop');
}

function openEditModal(id){
  const proj  = projects.find(p=>p.id===currentProjId);
  const stop  = ((proj?.stops||{})[currentDay]||[]).find(s=>s.id===id);
  if(!stop) return;
  editingStopId = id; _aiHighlights = [];
  document.getElementById('stop-modal-title').textContent = '✏️ 編輯景點';
  document.getElementById('stop-save-btn').textContent    = '💾 儲存';
  document.getElementById('inp-time').value = stop.time||''; document.getElementById('inp-name').value = stop.name||'';
  document.getElementById('inp-sub').value = stop.sub||''; document.getElementById('inp-lat').value = stop.lat||'';
  document.getElementById('inp-lng').value = stop.lng||''; document.getElementById('inp-desc').value = stop.desc||'';
  document.getElementById('inp-transport').value = stop.transport||''; document.getElementById('inp-type').value = stop.type||'sight';
  document.getElementById('inp-price').value = stop.price||'';
  document.getElementById('inp-free').value = stop.free ? 'true':'false';
  document.getElementById('price-field').style.display = stop.free ? 'none':'';
  document.getElementById('ai-highlights-preview').style.display='none';
  document.getElementById('search-section').style.display='none';
  openModal('modal-stop');
}

async function saveStop(){
  const name = document.getElementById('inp-name').value.trim();
  if(!name){ showToast('⚠️ 請輸入景點名稱'); return; }
  const time = document.getElementById('inp-time').value;
  const sub = document.getElementById('inp-sub').value.trim();
  const desc = document.getElementById('inp-desc').value.trim();
  const transport = document.getElementById('inp-transport').value.trim();
  const type = document.getElementById('inp-type').value;
  const free = document.getElementById('inp-free').value === 'true';
  const price = document.getElementById('inp-price').value.trim();
  let lat = parseFloat(document.getElementById('inp-lat').value); if(isNaN(lat)) lat=null;
  let lng = parseFloat(document.getElementById('inp-lng').value); if(isNaN(lng)) lng=null;

  const highlights = _aiHighlights.length ? _aiHighlights : undefined;
  const proj = projects.find(p=>p.id===currentProjId);
  if(!proj.stops[currentDay]) proj.stops[currentDay]=[];
  const stops = proj.stops[currentDay];

  if(editingStopId){
    const stop = stops.find(s=>s.id===editingStopId);
    if(stop){
      Object.assign(stop,{time,name,sub,desc,type,free,price,transport,lat,lng});
      if(highlights) stop.highlights = highlights;
    }
    showToast('✅ 景點已更新');
  } else {
    const ns = {id:genId(),time,name,sub,desc,type,free,price,highlights:highlights||[],transport,lat,lng};
    if(insertAfterIdx<0||insertAfterIdx>=stops.length-1) stops.push(ns);
    else stops.splice(insertAfterIdx+1,0,ns);
    showToast('✅ 景點已新增');
  }
  
  await saveProjects();
  closeModal('modal-stop');
  renderTimeline();
  if(leafletMap) updateMapMarkers();
}

async function deleteStop(id){
  if(!confirm('確定要刪除這個景點嗎？')) return;
  const proj = projects.find(p=>p.id===currentProjId);
  proj.stops[currentDay] = (proj.stops[currentDay]||[]).filter(s=>s.id!==id);
  await saveProjects();
  renderTimeline();
  if(leafletMap) updateMapMarkers();
  showToast('🗑️ 景點已刪除');
}

/* ═══════════════════════════════════════════════════════════
   AI 功能 (Gemini) 與搜尋
═══════════════════════════════════════════════════════════ */
function getApiKey(){ return localStorage.getItem('gemini_api_key')||''; }
function openApiKeyModal(){
  const key = getApiKey();
  document.getElementById('inp-apikey').value = key;
  const status = document.getElementById('apikey-status');
  status.textContent = key ? '✅ 已設定 Key' : '';
  status.style.color = '#66bb6a';
  openModal('modal-apikey');
}
function saveApiKey(){
  const key = document.getElementById('inp-apikey').value.trim();
  localStorage.setItem('gemini_api_key', key);
  updateApiKeyBadge(); closeModal('modal-apikey'); showToast('✅ 儲存成功');
}
function updateApiKeyBadge(){
  const badge = document.getElementById('badge-api'); if(!badge) return;
  const hasKey = !!getApiKey();
  badge.style.color = hasKey ? '#66bb6a' : 'var(--amber)';
  badge.style.borderColor = hasKey ? 'rgba(102,187,106,0.3)' : 'rgba(255,167,38,0.3)';
  badge.textContent = hasKey ? '🤖 AI ✓' : '🤖 API';
}

let _aiHighlights = [];
async function generateHighlights(){
  const apiKey = getApiKey();
  if(!apiKey){ showToast('⚠️ 請先設定 Gemini API Key'); openApiKeyModal(); return; }
  const name = document.getElementById('inp-name').value.trim();
  const desc = document.getElementById('inp-desc').value.trim();
  if(!name){ showToast('⚠️ 請先填入景點名稱'); return; }

  const btn = document.getElementById('ai-highlights-btn');
  btn.innerHTML = '⏳ AI 生成中...'; btn.style.pointerEvents = 'none';
  document.getElementById('ai-highlights-preview').style.display='none';
  _aiHighlights = [];

  try{
    const prompt = `你是旅遊達人。請為以下景點產生 3 條繁體中文「推薦亮點」。每條不超過20字。景點名稱：${name}${desc?`\n簡介：${desc}`:''}\n直接輸出3條，不加編號。`;
    // 更新為 2026 年最新預覽版模型
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-flash-lite-preview:generateContent?key=${apiKey}`;
    const res = await fetch(url, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }], generationConfig: { maxOutputTokens: 300 } })
    });
    if(!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const text = data.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
    _aiHighlights = text.split('\n').map(s=>s.trim()).filter(s=>s.length>3);

    if(_aiHighlights.length){
      document.getElementById('ai-highlights-list').innerHTML = _aiHighlights.map(h=>`<div style="padding:2px 0;">• ${h}</div>`).join('');
      document.getElementById('ai-highlights-preview').style.display='';
    } else showToast('⚠️ AI 回傳格式異常');
  } catch(e){
    console.error(e); showToast(`⚠️ AI 錯誤`);
  } finally {
    btn.innerHTML='🤖 AI 自動產生推薦亮點'; btn.style.pointerEvents='';
  }
}
function acceptHighlights(){
  document.getElementById('ai-highlights-preview').style.borderColor='rgba(102,187,106,0.4)';
  document.getElementById('ai-highlights-preview').style.background='rgba(102,187,106,0.06)';
  showToast('✅ 亮點已採用');
}

let _searchTimer = null;
function onSearchInput(val){
  clearTimeout(_searchTimer);
  if(!val || val.length < 2) { document.getElementById('search-results').style.display='none'; return; }
  document.getElementById('search-spinner').style.display='';
  _searchTimer = setTimeout(()=> doSearch(val), 500);
}
async function doSearch(q){
  const spinner = document.getElementById('search-spinner');
  try{
    const proj = projects.find(p=>p.id===currentProjId);
    const center = proj?.mapCenter || [35.6812,139.7671];
    const vb = `${center[1]-2},${center[0]-2},${center[1]+2},${center[0]+2}`;
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=6&addressdetails=1&namedetails=1&viewbox=${vb}&bounded=0`;
    const res  = await fetch(url, {headers:{'Accept-Language':'zh-TW,en'}});
    const data = await res.json();
    spinner.style.display='none'; renderSearchResults(data);
  } catch(e){ spinner.style.display='none'; }
}
function renderSearchResults(data){
  const results = document.getElementById('search-results');
  if(!data.length){ results.innerHTML = `<div style="padding:14px;text-align:center;color:var(--t3);font-size:13px;">😕 找不到結果</div>`; results.style.display='block'; return; }
  results.innerHTML = data.map((item,i)=>{
    const name = item.name || item.display_name.split(',')[0];
    return `<div onclick="selectPlace(${i})" style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:pointer;">
      <div style="font-size:13px;font-weight:600;color:var(--t1);">${name}</div>
      <div style="font-size:11px;color:var(--t3);">${item.display_name}</div>
    </div>`;
  }).join('');
  results.style.display='block'; results._data = data;
}
function selectPlace(idx){
  const item = document.getElementById('search-results')._data[idx];
  document.getElementById('inp-name').value = item.name || item.display_name.split(',')[0];
  document.getElementById('inp-lat').value  = item.lat; document.getElementById('inp-lng').value  = item.lon;
  document.getElementById('search-results').style.display='none';
  document.getElementById('selected-place').style.display='block';
  document.getElementById('selected-name-preview').textContent = document.getElementById('inp-name').value;
}

/* ═══════════════════════════════════════════════════════════
   Leaflet 地圖功能
═══════════════════════════════════════════════════════════ */
function initLeafletMap(){
  if(leafletMap){ leafletMap.invalidateSize(); updateMapMarkers(); return; }
  const proj = projects.find(p=>p.id===currentProjId);
  leafletMap = L.map('leaflet-map',{ center: proj?.mapCenter||[33.5902, 130.4017], zoom:14 });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ maxZoom:19 }).addTo(leafletMap);
  markersLayer = L.layerGroup().addTo(leafletMap);
  updateMapMarkers();
}
function makeIcon(color, num){
  return L.divIcon({ className:'', html:`<div style="width:34px;height:34px;border-radius:50%;background:${color};display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;border:2px solid rgba(255,255,255,0.3);">${num}</div>`, iconSize:[34,34], iconAnchor:[17,17] });
}
function updateMapMarkers(){
  if(!leafletMap || !markersLayer) return;
  markersLayer.clearLayers();
  const proj  = projects.find(p=>p.id===currentProjId);
  const stops = (proj?.stops||{})[currentDay]||[];
  const latlngs = [];
  stops.forEach((stop,idx)=>{
    if(!stop.lat || !stop.lng) return;
    const ll = [stop.lat, stop.lng];
    const marker = L.marker(ll, {icon: makeIcon('#ffa726', idx+1)}).bindPopup(`<b>${stop.name}</b>`);
    markersLayer.addLayer(marker); latlngs.push(ll);
  });
  if(latlngs.length>1) L.polyline(latlngs,{color:'rgba(240,98,146,0.7)',weight:2.5,dashArray:'6 4'}).addTo(markersLayer);
  if(latlngs.length) try{ leafletMap.fitBounds(L.latLngBounds(latlngs).pad(0.2)); }catch(e){}
}
function flyToStop(stopId){
  const stop = ((projects.find(p=>p.id===currentProjId)?.stops||{})[currentDay]||[]).find(s=>s.id===stopId);
  if(!stop?.lat) return;
  switchView('map');
  setTimeout(()=> leafletMap.flyTo([stop.lat,stop.lng],16),200);
}
